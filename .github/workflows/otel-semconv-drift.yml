name: OpenTelemetry GenAI semconv drift

on:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: otel-genai-semconv-drift
  cancel-in-progress: false

jobs:
  inspect:
    name: inspect upstream mapping source
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.x

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inspect upstream commit
        run: pnpm run otel-semconv:drift > otel-semconv-drift.json

      - name: Reconcile drift review issue
        # actions/github-script v9.0.0
        uses: actions/github-script@ff4b64fc288a21d5291396a384c1273f032e6333
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("node:fs");
            const result = JSON.parse(
              fs.readFileSync("otel-semconv-drift.json", "utf8"),
            );

            if (result.status !== "current" && result.status !== "drift") {
              throw new Error(`Unexpected drift status: ${String(result.status)}`);
            }

            const title = "chore(otel): review GenAI semantic-convention drift";
            const marker = "<!-- otel-genai-semconv-drift -->";
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });
            const existing = issues.find(
              (issue) =>
                !issue.pull_request &&
                issue.title === title &&
                issue.body?.includes(marker),
            );

            const summaryRows = [
              [{ data: "Status", header: true }, result.status],
              [{ data: "Pinned commit", header: true }, result.pinnedCommit],
              [{ data: "Upstream commit", header: true }, result.latestCommit],
              [{ data: "Comparison", header: true }, result.compareUrl],
            ];
            await core.summary
              .addHeading("OpenTelemetry GenAI semconv drift")
              .addTable(summaryRows)
              .write();

            if (result.status === "current") {
              core.info(`Pinned semconv commit is current: ${result.pinnedCommit}`);
              if (existing?.state === "open") {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: "closed",
                  state_reason: "completed",
                });
                core.info(`Closed resolved drift review issue #${existing.number}`);
              }
              return;
            }

            const body = [
              marker,
              "",
              "The pinned OpenTelemetry GenAI semantic-convention snapshot no longer matches upstream `main`.",
              "",
              `- Pinned commit: \`${result.pinnedCommit}\` (${result.pinnedCommitUrl})`,
              `- Upstream commit: \`${result.latestCommit}\` (${result.latestCommitUrl})`,
              `- Comparison: ${result.compareUrl}`,
              "",
              "Review the mapped attributes, conformance fixture, migration notes, and version impact before changing the pin. This workflow intentionally does not update code or open a pull request automatically.",
              "",
              `Last observed by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
            ].join("\n");

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
                state: "open",
              });
              core.info(`Updated or reopened drift review issue #${existing.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
            core.info(`Created drift review issue #${created.data.number}`);
