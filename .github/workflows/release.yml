name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Require release commit on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "release commit ${GITHUB_SHA} is not reachable from origin/main" >&2
            exit 1
          fi

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup Bun
        # oven-sh/setup-bun v2.2.0
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: .bun-version

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Use pinned npm CLI
        run: |
          npm install --global npm@11.18.0
          npm --version

      - name: Check release tag version
        run: |
          version="$(node --print "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          expected_tag="v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "release tag ${GITHUB_REF_NAME} does not match package version ${expected_tag}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository check
        run: pnpm run check

      - name: Run release readiness
        run: pnpm run release-readiness

      - name: Verify pre-release consumer compatibility
        run: pnpm run compatibility

      - name: Check published version
        id: published
        run: |
          version="$(node --print "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          if npm view "genai-telemetry-redactor@${version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage package
        if: steps.published.outputs.exists != 'true'
        run: npm stage publish

      - name: Record manual approval requirement
        if: steps.published.outputs.exists != 'true'
        run: |
          {
            echo "## npm approval required"
            echo
            echo "The package was staged but is not public yet."
            echo "Review and approve it with 2FA in the npm Staged Packages page, then rerun this workflow to verify the public registry artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify published consumer compatibility
        if: steps.published.outputs.exists == 'true'
        run: |
          version="$(node --print "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          bun scripts/check-package-compatibility.ts --current "${version}"

      - name: Create GitHub release
        if: steps.published.outputs.exists == 'true'
        # actions/github-script v9.0.0
        uses: actions/github-script@ff4b64fc288a21d5291396a384c1273f032e6333
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`GitHub release already exists: ${existing.data.html_url}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: tag,
                generate_release_notes: true,
              });
              core.info(`Created GitHub release: ${created.data.html_url}`);
            }
